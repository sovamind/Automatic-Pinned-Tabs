<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: sans-serif;
      width: 320px;
      padding: 10px;
    }

    #urlList {
      list-style: none;
      padding: 0;
      margin: 0 0 10px 0;
    }

    #urlList li {
      display: flex;
      align-items: center;
      background: #eee;
      padding: 6px;
      margin-bottom: 6px;
      border-radius: 4px;
    }

    #urlList input[type="text"] {
      flex: 1;
      margin-right: 6px;
    }

    button {
      margin-left: 4px;
      padding: 2px 6px;
    }
    .icon-btn {
      background: none;
      border: none;
      padding: 0 4px;
      cursor: pointer;
    }

    .icon-btn img {
      width: 14px;
      height: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<h3>Pinned Tabs</h3>

<ul id="urlList"></ul>

<input id="newUrl" type="text" placeholder="https://example.com" style="width: 70%;">
<button id="addBtn">Add</button>

<script src="popup.js"></script>
</body>
</html>
