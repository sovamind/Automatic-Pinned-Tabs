<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: sans-serif;
      width: 320px;
      padding: 10px;
    }

    #urlList {
      list-style: none;
      padding: 0;
      margin: 0 0 10px 0;
    }

    #urlList li {
      display: flex;
      align-items: center;
      background: #eee;
      padding: 6px;
      margin-bottom: 6px;
      border-radius: 4px;
    }

    #urlList input[type="text"] {
      flex: 1;
      margin-right: 6px;
    }

    .icon-btn {
      background: none;
      border: none;
      padding: 0 4px;
      cursor: pointer;
    }

    .icon-btn img {
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .delete-btn:hover {
      background: #fdd;
      border-radius: 4px;
    }

    #addRow {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #newUrl {
      flex: 1;
    }
  </style>
</head>
<body>

<h3>Pinned Tabs</h3>

<ul id="urlList"></ul>

<div id="addRow">
  <input id="newUrl" type="text" placeholder="https://example.com">
  <button id="addBtn">Add</button>

  <!-- PLAY button -->
  <button id="playBtn" class="icon-btn">
    <img src="icons/fluent-go.png">
  </button>

  <!-- SAVE button: snapshot current pinned tabs as the list -->
  <button id="saveBtn" class="icon-btn" title="Save current pinned tabs as app list">
    <img src="icons/fluent-save.png">
  </button>
</div>

<script src="popup.js"></script>
</body>
</html>
